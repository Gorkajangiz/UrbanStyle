      xmlns:h="jakarta.faces.html"

      xmlns:ui="jakarta.faces.facelets">
    <h:head>
        <title>#{msg.manager_title}</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

        <ui:include src="./footer.xhtml"/>
